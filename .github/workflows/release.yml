name: Release

# Pushing a tag like v1.0.1 triggers: build + sign + notarize + publish to GitHub Releases.
# The release is created as a draft so you can write release notes before publishing.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release-mac:
    name: Build, sign, notarize, publish (macOS)
    runs-on: macos-latest
    timeout-minutes: 60

    permissions:
      contents: write   # required to upload assets to the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pre-flight — verify all signing secrets are present
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          missing=0
          check() {
            if [ -z "${!1}" ]; then
              echo "::error::Missing required secret: $1"
              missing=$((missing + 1))
            else
              # Print length only, never the value — GitHub redacts the value anyway, but length is harmless.
              echo "  ✓ $1 set (length: ${#1})"
            fi
          }
          check APPLE_ID
          check APPLE_APP_SPECIFIC_PASSWORD
          check APPLE_TEAM_ID
          check MAC_CERTIFICATE_P12_BASE64
          check MAC_CERTIFICATE_PASSWORD
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing required secret(s) are missing. Set them at Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All 5 signing secrets are present — proceeding with sign + notarize."

      - name: Decode Developer ID Application certificate
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -z "$MAC_CERTIFICATE_P12_BASE64" ]; then
            echo "::error::MAC_CERTIFICATE_P12_BASE64 secret is not set"
            exit 1
          fi
          echo "$MAC_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          # electron-builder reads CSC_LINK (file path or URL) + CSC_KEY_PASSWORD
          echo "CSC_LINK=$RUNNER_TEMP/cert.p12" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, publish to GitHub Releases
        env:
          # GitHub publishing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS code signing
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # CSC_LINK is set above by the decode step.

          # Apple notarization (notarytool)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

      - name: Upload generic-name aliases (always-latest download URLs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          # Copy the versioned DMGs to stable names so the landing page can link to
          # https://github.com/AllenGao6/mind-whisper/releases/latest/download/MindWhisper-<arch>.dmg
          # and always get the newest installer.
          for arch in arm64 x64; do
            src=$(ls MindWhisper-*-${arch}.dmg 2>/dev/null | head -n 1)
            if [ -n "$src" ]; then
              cp "$src" "MindWhisper-${arch}.dmg"
              echo "Aliased $src → MindWhisper-${arch}.dmg"
            fi
          done
          # Intel x64 fallback (electron-builder may omit the arch suffix for x64)
          if [ ! -f MindWhisper-x64.dmg ]; then
            src=$(ls MindWhisper-*.dmg | grep -v arm64 | head -n 1 || true)
            if [ -n "$src" ]; then
              cp "$src" "MindWhisper-x64.dmg"
              echo "Aliased $src → MindWhisper-x64.dmg"
            fi
          fi
          ls MindWhisper-arm64.dmg MindWhisper-x64.dmg 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" \
            MindWhisper-arm64.dmg MindWhisper-x64.dmg --clobber || true

      - name: Cleanup certificate
        if: always()
        run: rm -f "$RUNNER_TEMP/cert.p12"
