name: Release

# Pushing a tag like v1.0.1 triggers: build + sign + notarize + publish to GitHub Releases.
# The release is created as a draft so you can write release notes before publishing.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release-mac:
    name: Build, sign, notarize, publish (macOS)
    runs-on: macos-latest
    timeout-minutes: 60

    permissions:
      contents: write   # required to upload assets to the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode Developer ID Application certificate
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -z "$MAC_CERTIFICATE_P12_BASE64" ]; then
            echo "::error::MAC_CERTIFICATE_P12_BASE64 secret is not set"
            exit 1
          fi
          echo "$MAC_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          # electron-builder reads CSC_LINK (file path or URL) + CSC_KEY_PASSWORD
          echo "CSC_LINK=$RUNNER_TEMP/cert.p12" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, publish to GitHub Releases
        env:
          # GitHub publishing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS code signing
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # CSC_LINK is set above by the decode step.

          # Apple notarization (notarytool)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

      - name: Cleanup certificate
        if: always()
        run: rm -f "$RUNNER_TEMP/cert.p12"
