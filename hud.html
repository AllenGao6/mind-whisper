<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  body { display: flex; align-items: stretch; }
  #hud {
    flex: 1;
    margin: 6px;
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    color: #e0e0e0;
    font-size: 12px;
    line-height: 1.3;
  }
  #meter {
    width: 36px;
    height: 32px;
    flex-shrink: 0;
    display: block;
    background: rgba(0, 0, 0, 0.25);
    border-radius: 4px;
  }
  #content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  #label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  #text {
    color: #fff;
    font-size: 12px;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .interim { color: #888; }
  .final { color: #fff; }
  .dot-pulse {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    background: #4ade80;
  }
  .dot-pulse.recording { background: #ef4444; animation: pulse 1s infinite; }
  .dot-pulse.transcribing { background: #facc15; animation: pulse 1.5s infinite; }
  .dot-pulse.formatting { background: #5b9bd5; animation: pulse 1.5s infinite; }
  .dot-pulse.error { background: #ef4444; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
</style>
</head>
<body>
  <div id="hud">
    <canvas id="meter" width="36" height="32"></canvas>
    <div id="content">
      <div id="label"><span id="dot" class="dot-pulse"></span><span id="label-text">Listening…</span></div>
      <div id="text"></div>
    </div>
  </div>
  <script src="hud-renderer.js"></script>
</body>
</html>
