<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  /* Anchor content to the bottom-center; the window grows upward on expand. */
  body { display: flex; align-items: flex-end; justify-content: center; padding: 6px; }

  #hud {
    width: 188px;                 /* idle width; overridden per-state below */
    flex-shrink: 0;               /* hold our set width; don't shrink to the narrow viewport */
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    color: #e0e0e0;
    font-size: 12px;
    line-height: 1.3;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #hud.active   { width: 348px; }
  #hud.expanded { width: 408px; }

  /* ── Idle: a thin, empty sliver. No text, no buttons — just a hover target
     that never blocks the user's screen (Wispr-Flow collapsed handle). ── */
  #hud.idle {
    width: 44px;
    height: 14px;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    padding: 0 0 0 7px;        /* dot hugs the left edge */
    background: rgba(255, 255, 255, 0.15);   /* translucent / frosted */
    border-color: rgba(255, 255, 255, 0.22);
    box-shadow: none;          /* flat */
    border-radius: 999px;      /* circular ends */
    overflow: visible;         /* let the dot's glow extend past the pill */
  }
  #handle { display: none; }
  #hud.idle #handle {
    display: block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #facc15;       /* yellow light */
    box-shadow: 0 0 6px 1px rgba(250, 204, 21, 0.7);   /* subtle glow */
  }

  /* ── Expanded control panel (pickers) ── */
  #panel { display: none; flex-direction: column; gap: 10px; padding: 12px 12px 6px; }
  #hud.expanded #panel { display: flex; }

  .picker-label {
    font-size: 10px;
    color: #8a8a8a;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 5px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-size: 11px;
    color: #cfcfcf;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    padding: 3px 9px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .chip:hover { background: rgba(255, 255, 255, 0.12); }
  .chip.selected {
    background: #5b9bd5;
    border-color: #5b9bd5;
    color: #fff;
  }
  .chip.disabled { opacity: 0.4; cursor: default; }
  .chip.disabled:hover { background: rgba(255, 255, 255, 0.06); }

  /* ── Status bar: shown only while recording/finalizing (active). ── */
  #bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; }
  #hud:not(.active) #bar { display: none; }

  #meter {
    width: 36px;
    height: 28px;
    flex-shrink: 0;
    display: none;                /* shown only while recording */
    background: rgba(0, 0, 0, 0.25);
    border-radius: 4px;
  }
  #hud.active #meter { display: block; }

  #content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  #label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; display: flex; align-items: center; }
  #text {
    color: #fff;
    font-size: 12px;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  #hud:not(.active) #text { display: none; }   /* no transcript text when idle/expanded */
  .interim { color: #888; }
  .final { color: #fff; }

  .dot-pulse {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    background: #4ade80;
    flex-shrink: 0;
  }
  .dot-pulse.recording { background: #ef4444; animation: pulse 1s infinite; }
  .dot-pulse.transcribing { background: #facc15; animation: pulse 1.5s infinite; }
  .dot-pulse.formatting { background: #5b9bd5; animation: pulse 1.5s infinite; }
  .dot-pulse.error { background: #ef4444; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
</style>
</head>
<body>
  <div id="hud" class="idle">
    <div id="handle"></div>
    <div id="panel">
      <div class="picker">
        <div class="picker-label">Language</div>
        <div class="chips" id="lang-chips"></div>
      </div>
      <div class="picker">
        <div class="picker-label">Format</div>
        <div class="chips" id="format-chips"></div>
      </div>
      <div class="picker">
        <div class="picker-label">Provider</div>
        <div class="chips" id="provider-chips"></div>
      </div>
    </div>
    <div id="bar">
      <canvas id="meter" width="36" height="28"></canvas>
      <div id="content">
        <div id="label"><span id="dot" class="dot-pulse"></span><span id="label-text">MindWhisper</span></div>
        <div id="text"></div>
      </div>
    </div>
  </div>
  <script src="hud-renderer.js"></script>
</body>
</html>
